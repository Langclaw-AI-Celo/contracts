name: Validate contracts

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out contracts
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1

      - name: Set up Foundry
        uses: foundry-rs/foundry-toolchain@b00af27efadbc7b4ca8b82abbd903b17cc874d2a
        with:
          version: v1.7.1

      - name: Test README link checker
        run: bash script/check-readme-links.test.sh

      - name: Check README links
        run: bash script/check-readme-links.sh

      - name: Validate vendored dependencies
        run: bash script/check-vendored-dependencies.sh

      - name: Check formatting
        run: forge fmt --check

      - name: Run tests
        run: forge test

      - name: Build contracts
        run: forge build
